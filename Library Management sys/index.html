<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1><i class="fas fa-book"></i> Library Management System</h1>
    </header>

    <div class="container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <button class="nav-btn active" onclick="App.showPage('dashboard')">
                <i class="fas fa-home"></i> Dashboard
            </button>
            <button class="nav-btn" onclick="App.showPage('books')">
                <i class="fas fa-book"></i> Books
            </button>
            <button class="nav-btn" onclick="App.showPage('members')">
                <i class="fas fa-users"></i> Members
            </button>
            <button class="nav-btn" onclick="App.showPage('issue')">
                <i class="fas fa-exchange-alt"></i> Issue/Return
            </button>
        </nav>

        <!-- Main Content -->
        <main class="main">
            <!-- Dashboard -->
            <section id="dashboard">
                <div class="cards">
                    <div class="card">
                        <i class="fas fa-book"></i>
                        <h3 id="totalBooks">0</h3>
                        <p>Total Books</p>
                    </div>
                    <div class="card">
                        <i class="fas fa-check-circle"></i>
                        <h3 id="availableBooks">0</h3>
                        <p>Available</p>
                    </div>
                    <div class="card">
                        <i class="fas fa-book-open"></i>
                        <h3 id="issuedBooks">0</h3>
                        <p>Issued Books</p>
                    </div>
                    <div class="card">
                        <i class="fas fa-user-friends"></i>
                        <h3 id="totalMembers">0</h3>
                        <p>Total Members</p>
                    </div>
                </div>
            </section>

            <!-- Books Section -->
            <section id="books" class="hidden">
                <div class="form-box">
                    <h2><i class="fas fa-plus"></i> Add/Edit Book</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label>ID</label>
                            <input type="text" id="bookId" readonly>
                        </div>
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" id="bookTitle">
                        </div>
                        <div class="form-group">
                            <label>Author</label>
                            <input type="text" id="bookAuthor">
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <select id="bookCategory">
                                <option value="">Select</option>
                                <option value="Fiction">Fiction</option>
                                <option value="Science">Science</option>
                                <option value="Tech">Tech</option>
                                <option value="Biography">Biography</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Total Copies</label>
                            <input type="number" id="totalCopies" min="1">
                        </div>
                        <div class="form-group">
                            <label>Available</label>
                            <input type="number" id="availableCopies" min="0">
                        </div>
                    </div>
                    <div>
                        <button class="btn btn-primary" onclick="Books.save()">Save Book</button>
                        <button class="btn btn-danger" onclick="Books.clearForm()">Clear</button>
                    </div>
                </div>

                <div class="search-box">
                    <input type="text" id="searchBook" placeholder="🔍 Search books..." onkeyup="Books.show()">
                    <select id="filterCat" onchange="Books.show()">
                        <option value="">All Categories</option>
                        <option value="Fiction">Fiction</option>
                        <option value="Science">Science</option>
                        <option value="Tech">Tech</option>
                        <option value="Biography">Biography</option>
                    </select>
                </div>

                <div class="table-box">
                    <h3>📚 Books List</h3>
                    <table id="booksTable">
                        <thead>
                            <tr>
                                <th>ID</th><th>Title</th><th>Author</th><th>Category</th><th>Total</th><th>Available</th><th>Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>

            <!-- Members Section -->
            <section id="members" class="hidden">
                <div class="form-box">
                    <h2><i class="fas fa-user-plus"></i> Add/Edit Member</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label>ID</label>
                            <input type="text" id="memberId" readonly>
                        </div>
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" id="memberName">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="memberEmail">
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" id="memberPhone">
                        </div>
                    </div>
                    <div>
                        <button class="btn btn-primary" onclick="Members.save()">Save Member</button>
                        <button class="btn btn-danger" onclick="Members.clearForm()">Clear</button>
                    </div>
                </div>

                <div class="table-box">
                    <h3>👥 Members List</h3>
                    <table id="membersTable">
                        <thead>
                            <tr>
                                <th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>

            <!-- Issue/Return Section -->
            <section id="issue" class="hidden">
                <div class="form-box">
                    <h2><i class="fas fa-exchange-alt"></i> Issue Book</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Select Member</label>
                            <select id="selectMember"></select>
                        </div>
                        <div class="form-group">
                            <label>Select Book</label>
                            <select id="selectBook"></select>
                        </div>
                    </div>
                    <button class="btn btn-success" onclick="Issues.issueBook()">📤 Issue Book</button>
                </div>

                <div class="form-box">
                    <h3>📥 Return Book</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Issue ID</label>
                            <input type="text" id="returnId" placeholder="Enter Issue ID">
                        </div>
                    </div>
                    <button class="btn btn-danger" onclick="Issues.returnBook()">Return Book</button>
                </div>

                <div class="table-box">
                    <h3>Current Issues</h3>
                    <div id="issuesList"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- JavaScript Files -->
    <script src="data/sample-data.js"></script>
    <script src="js/books.js"></script>
    <script src="js/members.js"></script>
    <script src="js/issues.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
